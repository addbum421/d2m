{% extends 'base.html' %}
{% block title %}로그인 — D2M{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h1 class="auth-title">🗺 D2M</h1>
    <p class="auth-sub">게임 맵 에디터</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="field">
        <label>아이디</label>
        <input type="text" name="username" autofocus required>
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn-primary">로그인</button>
    </form>
    <p class="auth-link">계정이 없으신가요? <a href="{% url 'register' %}">회원가입</a></p>
  </div>
</div>
{% endblock %}
