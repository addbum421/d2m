{% extends 'base.html' %}
{% block title %}회원가입 — D2M{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h1 class="auth-title">🗺 D2M</h1>
    <p class="auth-sub">새 계정 만들기</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'register' %}">
      {% csrf_token %}
      <div class="field">
        <label>아이디 (3자 이상)</label>
        <input type="text" name="username" autofocus required minlength="3">
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" name="password" required minlength="6">
      </div>
      <div class="field">
        <label>비밀번호 확인</label>
        <input type="password" name="password2" required>
      </div>
      <button type="submit" class="btn-primary">회원가입</button>
    </form>
    <p class="auth-link">이미 계정이 있으신가요? <a href="{% url 'login' %}">로그인</a></p>
  </div>
</div>
{% endblock %}
